<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>WayPoint Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f9fb;
        color: #17202c;
      }
      main {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid #d9e1ea;
        border-radius: 8px;
        background: white;
        padding: 24px;
        box-shadow: 0 16px 50px rgb(15 23 42 / 0.12);
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      p {
        margin: 12px 0 0;
        color: #596575;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WayPoint is offline</h1>
      <p>Polling is paused. If tracking is enabled, WayPoint keeps only the latest unsent location update locally.</p>
    </main>
  </body>
</html>
